<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Produits</title>
</head>

<body>

<h1>Liste des Produits</h1>
<h4>
    Nombre total de produits :
    <span th:text="${totalProduits}"></span>
</h4>
<a href="/produits/new">Ajouter Produit</a>
<br><br>

<form action="/produits/search" method="get">

    <input type="text" name="nom" placeholder="Rechercher produit">

    <button type="submit">Recherche</button>

</form>

<br>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Catégorie</th>
        <th>Prix</th>
        <th>Quantité</th>
        <th>Action</th>
    </tr>

    <tr th:each="p : ${produits}">

        <td th:text="${p.id}"></td>
        <td th:text="${p.nom}"></td>
        <td th:text="${p.categorie}"></td>
        <td th:text="${p.prix}"></td>
        <td th:text="${p.quantite}"></td>

        <td>
            <a th:href="@{/produits/delete/{id}(id=${p.id})}">Supprimer</a>
        </td>

    </tr>

</table>

<br>

<a href="/fournisseurs">Voir Fournisseurs</a> |
<a href="/mouvements">Voir Mouvements Stock</a>

</body>
</html>
