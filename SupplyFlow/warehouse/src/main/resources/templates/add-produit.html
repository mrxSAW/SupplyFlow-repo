<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Ajouter Produit</title>
</head>

<body>

<h2>Ajouter Produit</h2>

<form action="/produits" method="post" th:object="${produit}">

    Nom :
    <input type="text" th:field="*{nom}" required>
    <br><br>

    Catégorie :
    <input type="text" th:field="*{categorie}" required>
    <br><br>

    Prix :
    <input type="number" step="0.01" th:field="*{prix}" required>
    <br><br>

    Quantité :
    <input type="number" th:field="*{quantite}" required>
    <br><br>

    <button type="submit">Enregistrer</button>

</form>

<br>

<a href="/produits">Retour</a>

</body>
</html>
